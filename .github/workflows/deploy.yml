name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Check & Build
        run: npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: /var/www/light-of-india/backend
        run: |
          # Upload files
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'log' \
            --exclude '.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ $VPS_USER@$VPS_HOST:$VPS_PATH

      - name: Create .env and Restart PM2
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: /var/www/light-of-india/backend
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "
            cd $VPS_PATH
            echo '$ENV_PRODUCTION' > .env
            npm install --production
            pm2 restart light-of-india-backend 2>/dev/null || pm2 start build/src/server.js --name light-of-india-backend
            pm2 save
          "

      - name: Health Check
        run: |
          sleep 5
          curl -f https://lightofindia.nl/api/v1/health || echo "Health check endpoint not available"
